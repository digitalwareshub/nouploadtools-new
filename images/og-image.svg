<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#f7f6f3"/>

  <!-- Subtle grid texture — horizontal rules like a notepad -->
  <g opacity="0.06">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#1a1b26" stroke-width="1"/>
    <line x1="0" y1="175" x2="1200" y2="175" stroke="#1a1b26" stroke-width="1"/>
    <line x1="0" y1="245" x2="1200" y2="245" stroke="#1a1b26" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a1b26" stroke-width="1"/>
    <line x1="0" y1="385" x2="1200" y2="385" stroke="#1a1b26" stroke-width="1"/>
    <line x1="0" y1="455" x2="1200" y2="455" stroke="#1a1b26" stroke-width="1"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#1a1b26" stroke-width="1"/>
  </g>

  <!-- Right panel — dark ink block -->
  <rect x="780" y="0" width="420" height="630" fill="#1a1b26"/>

  <!-- Orange accent strip -->
  <rect x="780" y="0" width="6" height="630" fill="#f97316"/>

  <!-- Favicon mark — inside dark panel -->
  <!-- Shield -->
  <path d="M960 140 L1040 172 L1040 264 Q1040 318 960 346 Q880 318 880 264 L880 172 Z" fill="#f97316"/>
  <!-- Arrow up -->
  <line x1="960" y1="318" x2="960" y2="228" stroke="#1a1b26" stroke-width="22" stroke-linecap="round"/>
  <polygon points="960,196 934,234 986,234" fill="#1a1b26"/>
  <!-- Strike through -->
  <line x1="892" y1="188" x2="1028" y2="308" stroke="#1a1b26" stroke-width="28" stroke-linecap="round"/>

  <!-- Domain label under mark -->
  <text x="960" y="400" font-family="Inter, system-ui, sans-serif" font-size="18" font-weight="400" fill="#9a9aaa" text-anchor="middle" letter-spacing="1">nouploadtools.com</text>

  <!-- Tagline on dark panel -->
  <text x="960" y="480" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400" fill="#4a4b5a" text-anchor="middle">We verify tools,</text>
  <text x="960" y="502" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="400" fill="#4a4b5a" text-anchor="middle">not promises.</text>

  <!-- Left content area -->
  <!-- Eyebrow -->
  <rect x="72" y="148" width="10" height="10" rx="2" fill="#f97316"/>
  <text x="92" y="158" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="600" fill="#f97316" letter-spacing="2">FREE TOOL DIRECTORY</text>

  <!-- Main headline -->
  <text x="72" y="240" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="700" fill="#1a1b26" letter-spacing="-2">No</text>
  <text x="167" y="240" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="700" fill="#f97316" letter-spacing="-2">Upload</text>
  <text x="380" y="240" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="700" fill="#1a1b26" letter-spacing="-2">Tools</text>

  <!-- Sub headline -->
  <text x="72" y="300" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#4a4b5a">Browser-based tools that process</text>
  <text x="72" y="330" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#4a4b5a">everything locally. Your files stay on</text>
  <text x="72" y="360" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="400" fill="#4a4b5a">your device.</text>

  <!-- Three trust pills -->
  <!-- Pill 1 -->
  <rect x="72" y="420" width="148" height="36" rx="18" fill="#1a1b26"/>
  <text x="146" y="443" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">No upload</text>

  <!-- Pill 2 -->
  <rect x="232" y="420" width="148" height="36" rx="18" fill="#1a1b26"/>
  <text x="306" y="443" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">No account</text>

  <!-- Pill 3 -->
  <rect x="392" y="420" width="168" height="36" rx="18" fill="#f97316"/>
  <text x="476" y="443" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Open source ✓</text>

  <!-- Bottom divider line -->
  <line x1="72" y1="510" x2="700" y2="510" stroke="#e4e2dc" stroke-width="1"/>

  <!-- Bottom stat line -->
  <text x="72" y="548" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="400" fill="#9a9aaa">Curated · Verified · Privacy-first · Made in Bangkok 🇹🇭</text>

</svg>
